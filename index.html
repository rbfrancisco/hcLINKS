<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>hcLINKS — Agregador de Links</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <h1 class="site-title"><span class="title-accent">hc</span>LINKS</h1>
      <p class="site-subtitle">Agregador de Links</p>
    </div>
  </header>

  <main class="main">
    <div class="links-card">

      <section class="links-section">
        <h2 class="section-title">Ferramentas</h2>
        <div class="links-grid">

          <a href="https://hclab.vercel.app/" target="_blank" rel="noopener noreferrer" class="link-item">
            <div class="link-icon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 3h6v11l-3 3-3-3V3z"/>
                <path d="M6 14l3 3"/>
                <path d="M18 14l-3 3"/>
                <path d="M6 14a2 2 0 0 0-2 2c0 1.7 1.3 5 8 5s8-3.3 8-5a2 2 0 0 0-2-2"/>
              </svg>
            </div>
            <div class="link-content">
              <span class="link-name"><span class="link-name-accent">hc</span>Lab</span>
              <span class="link-description">Plataforma de laboratório</span>
            </div>
            <div class="link-arrow">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="7" y1="17" x2="17" y2="7"/>
                <polyline points="7 7 17 7 17 17"/>
              </svg>
            </div>
          </a>

          <a href="https://hcpdf.vercel.app/" target="_blank" rel="noopener noreferrer" class="link-item">
            <div class="link-icon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
                <polyline points="10 9 9 9 8 9"/>
              </svg>
            </div>
            <div class="link-content">
              <span class="link-name"><span class="link-name-accent">hc</span>PDF</span>
              <span class="link-description">Gerador de documentos PDF</span>
            </div>
            <div class="link-arrow">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="7" y1="17" x2="17" y2="7"/>
                <polyline points="7 7 17 7 17 17"/>
              </svg>
            </div>
          </a>

        </div>
      </section>

      <section class="links-section">
        <h2 class="section-title">Recursos</h2>
        <div class="links-grid">

          <a href="https://drive.google.com/drive/u/1/folders/19PpMQVisFn6Dad1xm8J196Nsg2-8NX6V" target="_blank" rel="noopener noreferrer" class="link-item">
            <div class="link-icon link-icon-drive">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 12h-6l-2 3H6l-2-3H2"/>
                <path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/>
              </svg>
            </div>
            <div class="link-content">
              <span class="link-name">Google Drive</span>
              <span class="link-description">Pasta compartilhada de arquivos</span>
            </div>
            <div class="link-arrow">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="7" y1="17" x2="17" y2="7"/>
                <polyline points="7 7 17 7 17 17"/>
              </svg>
            </div>
          </a>

        </div>
      </section>

    </div>
  </main>

  <footer class="site-footer">
    <p>Links centralizados para acesso rápido às ferramentas e recursos.</p>
  </footer>

</body>
</html>
